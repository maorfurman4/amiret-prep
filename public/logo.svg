<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#1A237E"/>

  <!-- Left book page -->
  <rect x="90" y="148" width="148" height="210" rx="12" fill="none" stroke="white" stroke-width="14"/>
  <!-- Right book page -->
  <rect x="274" y="148" width="148" height="210" rx="12" fill="none" stroke="white" stroke-width="14"/>
  <!-- Book spine line -->
  <line x1="256" y1="148" x2="256" y2="358" stroke="white" stroke-width="10"/>
  <!-- Bottom base of book -->
  <line x1="90" y1="370" x2="422" y2="370" stroke="white" stroke-width="8" stroke-linecap="round"/>

  <!-- Letter A on right page -->
  <text x="348" y="295" text-anchor="middle" font-size="100" font-family="Arial, Helvetica, sans-serif" fill="white" font-weight="700">A</text>

  <!-- AMIRAM text below -->
  <text x="256" y="430" text-anchor="middle" font-size="52" font-family="Arial, Helvetica, sans-serif" fill="#90CAF9" font-weight="700" letter-spacing="6">AMIRAM</text>
</svg>
